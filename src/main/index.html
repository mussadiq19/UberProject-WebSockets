<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>Document</title>  <script src="https://cdn.jsdelivr.net/sockjs/1.1.4/sockjs.min.js"></script>  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script></head><body>      <div>        <button onclick="connect()">Connect</button>1      </div>      <div>        <input type="text" id="name" placeholder="name">        <input type="text" id="message" placeholder="message">        <button onclick="submit()">Submit</button>      </div>      <ul id="list">      </ul>      <script>        var stompClient = null;        function connect() {          const socket = new SockJS("http://localhost:8080/ws")          stompClient = Stomp.over(socket);          stompClient.connect({}, function () {            console.log("connected");            stompClient.subscribe("/topic/ping", function (message) {              console.log("recieved a new message from the server", message);            })            // stompClient.subscribe("/topic/scheduled",function (message){            //   console.log("recieved a new scheduled message from the server",message);            //   const li = document.createElement("li");            //   li.textContent=message.body;            //   document.getElementById("list").appendChild(li);            //            // })            stompClient.subscribe("/topic/message", function (data) {              const msg = JSON.parse(data.body);              const li = document.createElement("li");              li.textContent = `${msg.name} : ${msg.timestamp} - ${msg.message}`;              document.getElementById("list").appendChild(li);            })              stompClient.subscribe("/topic/rideRequest", function (data) {                  const bookingId =JSON.parse(data.body).bookingId;                  const response =confirm(`You have a new ride request from passenger: ${JSON.parse(data.body).passengerId}.Do you accept it ?`);                  console.log(response);                  if(response === true ){                      const id = prompt("please enter you driverId");                      stompClient.send(`/app/rideResponse/${id}`,{}, JSON.stringify({response,bookingId}));                  }                  // stompClient.send("/app/rideResponse", {}, JSON.stringify({response}))              })          })        }        function submit(){          const name=document.getElementById("name").value;          const message=document.getElementById("message").value;          stompClient.send("/app/chat",{},JSON.stringify({name,message}));        }      </script></body></html>
